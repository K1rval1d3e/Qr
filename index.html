<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Qr photo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .container {
            background: #16213e;
            border-radius: 20px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #video {
            width: 100%;
            border-radius: 12px;
            background: #000;
            display: block;
            transform: scaleX(-1);
        }
        #canvas { display: none; }
        .preview-container {
            margin-top: 15px;
            text-align: center;
        }
        #preview-img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            border: 2px solid #e94560;
            display: none;
            margin-top: 10px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 120px;
        }
        .btn-capture {
            background: #e94560;
            color: white;
        }
        .btn-capture:hover { background: #c73652; transform: scale(1.03); }
        .btn-capture:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }
        .btn-reset {
            background: #533483;
            color: white;
        }
        .btn-reset:hover { background: #6a4c9c; transform: scale(1.03); }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            background: #0f3460;
            color: #eee;
            text-align: center;
            font-size: 14px;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }
        .status.success { background: #1b7a3d; }
        .status.error { background: #8b1a2b; }
        .status.uploading { background: #b8860b; }
        #photo-data {
            margin-top: 12px;
            font-size: 12px;
            color: #aaa;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
            background: #0d1b2a;
            padding: 8px;
            border-radius: 8px;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="preview-container">
        <img id="preview-img" alt="Превью фото">
    </div>

    <div class="btn-group">
        <button class="btn btn-capture" id="captureBtn" disabled>📸 Снять фото</button>
        <button class="btn btn-reset" id="resetBtn">🔄 Сбросить</button>
    </div>

    <div class="status" id="status">⏳ Запрос доступа к камере...</div>
    <div id="photo-data"></div>
</div>

<script>
    // ===== ВАШ ТОКЕН ЯНДЕКСА =====
    const YANDEX_TOKEN = 'y0__wgBEOaiqocEGIaDRCC65ouBGKVK9s5CugOnW1S7crszWXyaxPkx';

    // ===== ЭЛЕМЕНТЫ =====
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const previewImg = document.getElementById('preview-img');
    const captureBtn = document.getElementById('captureBtn');
    const resetBtn = document.getElementById('resetBtn');
    const statusDiv = document.getElementById('status');
    const photoDataDiv = document.getElementById('photo-data');

    let stream = null;
    let photoDataURL = null;

    // ===== 1. ЗАПУСК КАМЕРЫ =====
    async function startCamera() {
        try {
            statusDiv.textContent = '📷 Запрашиваю доступ к камере...';
            statusDiv.className = 'status';

            const constraints = {
                video: {
                    facingMode: { ideal: 'environment' },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await video.play();

            const track = stream.getVideoTracks()[0];
            const settings = track.getSettings();
            canvas.width = settings.width || 1280;
            canvas.height = settings.height || 720;

            captureBtn.disabled = false;
            statusDiv.textContent = '✅ Камера работает. Нажмите "Снять фото"!';
            statusDiv.className = 'status success';

        } catch (err) {
            console.error('Ошибка доступа к камере:', err);
            let msg = '❌ Не удалось получить доступ к камере: ';
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                msg += 'пользователь запретил доступ.';
            } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                msg += 'камера не найдена на устройстве.';
            } else {
                msg += err.message;
            }
            statusDiv.textContent = msg;
            statusDiv.className = 'status error';
            captureBtn.disabled = true;
        }
    }

    // ===== 2. ЗАХВАТ ФОТО =====
    function capturePhoto() {
        if (!stream || !video.videoWidth) {
            statusDiv.textContent = '❌ Камера ещё не готова. Подождите...';
            statusDiv.className = 'status error';
            return;
        }

        const context = canvas.getContext('2d');
        // Рисуем зеркально, чтобы отменить зеркало видео
        context.save();
        context.scale(-1, 1);
        context.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
        context.restore();

        photoDataURL = canvas.toDataURL('image/jpeg', 0.92);

        previewImg.src = photoDataURL;
        previewImg.style.display = 'block';

        const sizeKB = Math.round((photoDataURL.length * 3/4) / 1024);
        statusDiv.textContent = `⏳ Загружаю фото (${sizeKB} KB) на Яндекс Диск...`;
        statusDiv.className = 'status uploading';

        photoDataDiv.textContent = `Data URL (первые 100 символов): ${photoDataURL.substring(0, 100)}...`;

        if (navigator.vibrate) navigator.vibrate(30);

        // === ОТПРАВКА НА ЯНДЕКС ДИСК ===
        uploadPhotoToYandex(photoDataURL);
    }

    // ===== 3. ЗАГРУЗКА НА ЯНДЕКС ДИСК =====
    async function uploadPhotoToYandex(dataURL) {
        try {
            // Конвертируем Data URL в Blob
            const blob = await (await fetch(dataURL)).blob();
            const fileName = `photo_${Date.now()}.jpg`;
            const remotePath = `disk:/${fileName}`;

            // 1. Получаем ссылку для загрузки
            const url = `https://cloud-api.yandex.net/v1/disk/resources/upload?path=${encodeURIComponent(remotePath)}&overwrite=true`;
            const response = await fetch(url, {
                method: 'GET',
                headers: { 'Authorization': `OAuth ${YANDEX_TOKEN}` }
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(`API ошибка: ${errData.message || response.status}`);
            }

            const data = await response.json();
            const uploadUrl = data.href;

            // 2. Загружаем файл
            const uploadResponse = await fetch(uploadUrl, {
                method: 'PUT',
                body: blob,
                headers: { 'Content-Type': 'image/jpeg' }
            });

            if (uploadResponse.ok) {
                statusDiv.textContent = `✅ Фото загружено на Яндекс Диск как ${fileName}`;
                statusDiv.className = 'status success';
            } else {
                throw new Error(`Ошибка загрузки: ${uploadResponse.status}`);
            }

        } catch (error) {
            console.error('Ошибка загрузки:', error);
            statusDiv.textContent = `❌ Ошибка: ${error.message}`;
            statusDiv.className = 'status error';
        }
    }

    // ===== 4. СБРОС =====
    function resetPhoto() {
        previewImg.style.display = 'none';
        previewImg.src = '';
        photoDataURL = null;
        photoDataDiv.textContent = '';
        statusDiv.textContent = '🔄 Сброшено. Можно снять новое фото.';
        statusDiv.className = 'status';
        captureBtn.focus();
    }

    // ===== 5. ОСТАНОВКА КАМЕРЫ =====
    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
            video.srcObject = null;
        }
    }

    // ===== НАВЕШИВАЕМ СОБЫТИЯ =====
    captureBtn.addEventListener('click', capturePhoto);
    resetBtn.addEventListener('click', resetPhoto);
    window.addEventListener('beforeunload', stopCamera);

    // СТАРТ!
    startCamera();
</script>
</body>
</html>
